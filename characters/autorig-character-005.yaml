# IP 1차: 오리지널 마스코트라 캐릭터명 직지정 가능
ip_named: "GPT-chan, an original silver-haired anime mascot girl in white-and-black techwear"
# IP 거부 시 폴백: 외형 서술 (캐릭터명 없이)
