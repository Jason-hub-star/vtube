appearance:
  hair: "short silver-white bob, chin length, side-swept bangs, a small blue triangular hair clip on one side"
  eyes: "bright blue eyes, calm and sharp"
  outfit: "open white hooded techwear jacket over a black high-neck bodysuit with blue circuit-line accents, a thin dark collar at the neck"

# 쿨·첨단 AI 톤 — 입 개방 정도·눈 표정을 결정 (입/눈 시트 프롬프트에 주입)
expression_style: >-
  cool, composed and confident — a cutting-edge AI persona with a faint knowing smile;
  reserved and never grinning wide, eyes calm and intelligent; keep every mouth opening
  small and measured, corners only slightly raised

# 색 힌트 (실측이 최종 — 분리 임계 보조). 은발 vs 검은 보디수트 = 분리 쉬움(위벨 암녹/검정 난제 없음)
colors:
